services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather-kitchen-api-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/weather_kitchen.db
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      # Dev-only JWT secret — override with a real secret in production
      - JWT_SECRET_KEY=dev-only-secret-not-for-production
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
    volumes:
      - ./app:/app/app:rw
      - ./alembic:/app/alembic:rw
      - ./data:/app/data:rw
      - ./alembic.ini:/app/alembic.ini:ro
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: weather-kitchen-db
  #   environment:
  #     POSTGRES_USER: weather_kitchen
  #     POSTGRES_PASSWORD: development
  #     POSTGRES_DB: weather_kitchen
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U weather_kitchen"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: weather-kitchen-network
