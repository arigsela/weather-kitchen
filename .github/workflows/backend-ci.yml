name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff linter
        run: uv run ruff check app/ tests/

      - name: Run Ruff formatter check
        run: uv run ruff format --check app/ tests/

  security-scan:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Bandit security scan
        run: uv run bandit -r app/ -ll --exit-zero -f json -o bandit-report.json

      - name: Check for high/critical findings
        run: |
          HIGH=$(uv run bandit -r app/ -lll -q 2>&1 | grep -c "Issue:" || true)
          echo "High/Critical findings: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            uv run bandit -r app/ -lll
            exit 1
          fi

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-at-least-32-characters-long"
          DATABASE_URL: "sqlite:///./test.db"
          ENVIRONMENT: "test"
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

      - name: Upload coverage to summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'| Overall Coverage | {pct:.1f}% |')
          " >> $GITHUB_STEP_SUMMARY || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: weather-kitchen-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container health
        run: |
          docker run -d \
            --name test-api \
            -p 8000:8000 \
            -e JWT_SECRET_KEY="ci-test-secret-key-at-least-32-characters-long" \
            weather-kitchen-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health
          docker stop test-api
